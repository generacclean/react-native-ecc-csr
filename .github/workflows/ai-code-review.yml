name: AI Code Review

# Automated AI code review for react-native-ecc-csr PRs.
#
# Runs automatically on PRs whose author is on the allowlist
# (.github/ai-review/reviewers.txt). The review instructions live in
# .github/ai-review/review-prompt.md and can be edited via normal PRs.

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches: [main]

permissions:
  contents: read
  issues: write
  pull-requests: write
  id-token: write

concurrency:
  group: ai-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # Gate: only proceed if the PR author is on the allowlist and the PR is not a draft.
  gate:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    outputs:
      should_review: ${{ steps.check.outputs.should_review }}
    steps:
      - uses: actions/checkout@v4

      - name: Check PR author against allowlist
        id: check
        env:
          AUTHOR: ${{ github.event.pull_request.user.login }}
          ALLOWLIST: .github/ai-review/reviewers.txt
        run: |
          if [ ! -f "$ALLOWLIST" ]; then
            echo "::warning::Allowlist $ALLOWLIST not found; skipping review."
            echo "should_review=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Strip comments/whitespace/blank lines, then match the author case-insensitively.
          if sed 's/#.*//' "$ALLOWLIST" | tr -d ' \t' | grep -viE '^$' | grep -qix "$AUTHOR"; then
            echo "✅ $AUTHOR is on the allowlist — running AI review."
            echo "should_review=true" >> "$GITHUB_OUTPUT"
          else
            echo "ℹ️ $AUTHOR is not on the allowlist — skipping AI review."
            echo "should_review=false" >> "$GITHUB_OUTPUT"
          fi

  review:
    needs: gate
    if: needs.gate.outputs.should_review == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Load review prompt
        id: prompt
        env:
          PROMPT_FILE: .github/ai-review/review-prompt.md
        run: |
          if [ ! -f "$PROMPT_FILE" ]; then
            echo "::error::Prompt file $PROMPT_FILE not found."
            exit 1
          fi
          {
            echo 'prompt<<PROMPT_EOF'
            cat "$PROMPT_FILE"
            echo 'PROMPT_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::017820692424:role/GitHubClaudeBedrockRoleGeneracClean
          aws-region: us-east-1
          role-session-name: GitHubClaudeSession

      - name: Run AI code review
        uses: anthropics/claude-code-action@v1
        with:
          use_bedrock: true
          track_progress: true
          prompt: ${{ steps.prompt.outputs.prompt }}
          claude_args: |
            --model us.anthropic.claude-sonnet-4-6
            --max-turns 80
            --allowedTools "Read,Glob,Grep,Bash(git diff:*),Bash(git log:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh api:*),mcp__github__create_inline_comment,mcp__github__create_comment"
