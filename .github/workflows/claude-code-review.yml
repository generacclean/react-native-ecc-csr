name: Claude Code Review (Manual)

# Triggered manually via @claude mention in PR comments or claude-code label.
# Based on installer-app implementation with multiple trigger methods.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned, labeled]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

concurrency:
  group: claude-manual-review-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: |
      github.actor != 'claude[bot]' &&
      !endsWith(github.actor, '[bot]') &&
      (
        github.event_name == 'issues' &&
        github.event.action == 'labeled' &&
        github.event.label.name == 'claude-code'
        ||
        (github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment') &&
        contains(github.event.comment.body, '@claude')
        ||
        github.event_name == 'pull_request_review' &&
        github.event.review.body != '' &&
        contains(github.event.review.body, '@claude')
      )
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::017820692424:role/GitHubClaudeBedrockRoleGeneracClean
          aws-region: us-east-1
          role-session-name: GitHubClaudeSession

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          use_bedrock: true
          track_progress: true
          trigger_phrase: "@claude"
          prompt: |
            Perform a comprehensive code review on code changes in this pull request for the react-native-ecc-csr library with focus on:

            1. **Correctness & bugs** - Edge cases in cryptographic operations, null handling, memory leaks, native keystore cleanup, threading issues, ECC curve validation, CSR generation errors
            2. **Security** - Private key protection (hardware vs software keystore), encryption at rest (EncryptedFile usage), backup exclusion, key extraction vulnerabilities, ProGuard/R8 rules for BouncyCastle, TLS compatibility checks
            3. **Keystore management** - Hardware keystore detection (Android 12+ for TLS), software keystore encryption (AES256-GCM), BouncyCastle provider registration (remove system BC first), file permissions (0600), key alias handling
            4. **Native module patterns** - iOS/Android bridge patterns, promise/callback handling, error propagation, resource disposal
            5. **TypeScript types** - Type definitions accuracy, unsafe casts, proper ECCurve union types
            6. **Testing** - Adequate coverage for new logic, hardware/software keystore scenarios, ECC curve validation
            7. **Documentation** - API changes in README, security considerations documented, backup warnings, ProGuard rules

            Critical patterns to check:
            - Hardware keystore: Android 12+ only (API 31) for TLS/ECDH (`PURPOSE_AGREE_KEY`)
            - Software keystore: Must use EncryptedFile with AES256-GCM, mode 0600, backup exclusion
            - BouncyCastle: Remove system provider before registering full provider with EC support
            - ProGuard: Must keep EC algorithm classes (org.bouncycastle.jcajce.provider.asymmetric.ec.*)

            Rate each issue from 0-100:
            0-25: Likely false positive
            26-50: Minor nitpick
            51-75: Valid but low-impact
            76-90: Important issue requiring attention
            91-100: Critical bug (key exposure, crypto failure, TLS incompatibility, memory leak, backup vulnerability)

            Only report issues with confidence more than 80% and rate over 75.

            Summary should include: overview of changes, list of issues found (with severity), and an overall assessment.
            If you find no issues which satisfy passing criteria, post in summary NO ISSUES FOUND.

            Provide detailed feedback using inline comments for specific issues.
            Do not duplicate unaddressed inline comments. If inline comment marked as resolved, skip it.
            On re-reviews, skip already-addressed issues and focus inline comments on newly introduced code.
            Use `mcp__github_inline_comment__create_inline_comment` to highlight specific code issues.
            Use `gh pr comment` for top-level summary feedback.
            Only post GitHub comments — don't submit review text as messages.
          claude_args: |
            --model us.anthropic.claude-sonnet-4-6
            --max-turns 40
            --allowedTools "Read,Glob,Grep,Bash(git diff:*),Bash(git log:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh api:*),mcp__github__create_inline_comment,mcp__github__create_comment"
