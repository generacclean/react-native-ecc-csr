name: Claude Code Review (Manual)

# Triggered manually via @claude mention in PR comments or claude-code label.
# Based on installer-app implementation with multiple trigger methods.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned, labeled]
  pull_request_review:
    types: [submitted]

permissions:
  contents: read
  issues: write
  pull-requests: write
  id-token: write

concurrency:
  group: claude-manual-review-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: |
      github.actor != 'claude[bot]' &&
      !endsWith(github.actor, '[bot]') &&
      (
        github.event_name == 'issues' &&
        github.event.action == 'labeled' &&
        github.event.label.name == 'claude-code'
        ||
        (github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment') &&
        contains(github.event.comment.body, '@claude')
        ||
        github.event_name == 'pull_request_review' &&
        github.event.review.body != '' &&
        contains(github.event.review.body, '@claude')
      )
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Load review prompt
        id: prompt
        env:
          PROMPT_FILE: .github/ai-review/review-prompt.md
        run: |
          if [ ! -f "$PROMPT_FILE" ]; then
            echo "::error::Prompt file $PROMPT_FILE not found."
            exit 1
          fi
          {
            echo 'prompt<<PROMPT_EOF'
            cat "$PROMPT_FILE"
            echo 'PROMPT_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@ff717079ee2060e4bcee96c4779b553acc87447c # v4
        with:
          role-to-assume: arn:aws:iam::017820692424:role/GitHubClaudeBedrockRoleGeneracClean
          aws-region: us-east-1
          role-session-name: GitHubClaudeSession

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@20788873eee4d19ee082cf3ddbda2d6e0ac7462b # v1
        with:
          use_bedrock: true
          track_progress: true
          trigger_phrase: "@claude"
          prompt: ${{ steps.prompt.outputs.prompt }}
          claude_args: |
            --model us.anthropic.claude-sonnet-4-6
            --max-turns 40
            --allowedTools "Read,Glob,Grep,Bash(git diff:*),Bash(git log:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh api:*),mcp__github_inline_comment__create_inline_comment,mcp__github__create_comment"
