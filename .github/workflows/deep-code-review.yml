name: Deep Code Review

# Comprehensive deep code review with specialized reviewers.
# Triggered manually via /deep-review command in PR comments.
# More thorough but more expensive than single-agent review.

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write
  id-token: write

concurrency:
  group: deep-review-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  deep-review:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      github.event.issue.pull_request &&
      !endsWith(github.actor, '[bot]') &&
      contains(github.event.comment.body, '/deep-review')
    steps:
      - name: Get PR metadata
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr view ${{ github.event.issue.number }} --repo ${{ github.repository }} \
            --json number,headRefName \
            --jq '"number=\(.number)\nhead_ref=\(.headRefName)"' >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ steps.pr.outputs.head_ref }}
          fetch-depth: 0

      - name: Build review prompt
        id: prompt
        env:
          PROMPT_FILE: .github/ai-review/deep-review-prompt.md
        run: |
          if [ ! -f "$PROMPT_FILE" ]; then
            echo "::error::Deep review prompt file $PROMPT_FILE not found."
            exit 1
          fi
          pr_number="${{ steps.pr.outputs.number }}"
          {
            echo 'prompt<<DEEP_REVIEW_PROMPT_EOF'
            # Substitute {{PR_NUMBER}} placeholder with actual PR number
            sed "s/{{PR_NUMBER}}/${pr_number}/g" "$PROMPT_FILE"
            echo 'DEEP_REVIEW_PROMPT_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@ff717079ee2060e4bcee96c4779b553acc87447c # v4
        with:
          role-to-assume: arn:aws:iam::017820692424:role/GitHubClaudeBedrockRoleGeneracClean
          aws-region: us-east-1
          role-session-name: GitHubClaudeSession

      - name: Run Deep Code Review
        uses: anthropics/claude-code-action@20788873eee4d19ee082cf3ddbda2d6e0ac7462b # v1
        with:
          use_bedrock: true
          track_progress: true
          trigger_phrase: '/deep-review'
          prompt: ${{ steps.prompt.outputs.prompt }}
          claude_args: |
            --model us.anthropic.claude-sonnet-4-6
            --max-turns 80
            --allowedTools "Agent,Read,Glob,Grep,Bash(git rev-parse:*),Bash(git log:*),Bash(git diff:*),Bash(git fetch:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh api:*),mcp__github_inline_comment__create_inline_comment,mcp__github__create_comment"
