name: Deep Code Review

# Comprehensive deep code review with specialized reviewers.
# Triggered manually via /deep-review command in PR comments.
# More thorough but more expensive than single-agent review.

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write
  id-token: write

concurrency:
  group: deep-review-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  deep-review:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      github.event.issue.pull_request &&
      !endsWith(github.actor, '[bot]') &&
      contains(github.event.comment.body, '/deep-review')
    steps:
      - name: Get PR metadata
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr view ${{ github.event.issue.number }} --repo ${{ github.repository }} \
            --json number,headRefName \
            --jq '"number=\(.number)\nhead_ref=\(.headRefName)"' >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.head_ref }}
          fetch-depth: 0

      - name: Build review prompt
        id: prompt
        run: |
          pr_number="${{ steps.pr.outputs.number }}"
          {
            echo 'prompt<<DEEP_REVIEW_PROMPT_EOF'
            echo 'You are running a deep code review in CI for react-native-ecc-csr.'
            echo ''
            echo "PR NUMBER: ${pr_number}"
            echo ''
            echo '## Review Strategy'
            echo ''
            echo 'Spawn 5 specialized agents in parallel to review different dimensions:'
            echo ''
            echo '1. **intent-reviewer** - Verify changes match PR intent/title'
            echo '2. **clarity-reviewer** - Check code readability and maintainability'
            echo '3. **robustness-reviewer** - Find edge cases, error handling gaps, memory leaks, crypto bugs'
            echo '4. **consistency-reviewer** - Check keystore patterns, BouncyCastle usage, type consistency'
            echo '5. **completeness-reviewer** - Verify tests, docs, security documentation updated'
            echo ''
            echo '## Agent Definitions'
            echo ''
            echo '### intent-reviewer'
            echo 'Verify the changes align with PR title and description. Check if commits match stated intent.'
            echo 'Focus: scope creep, unrelated changes, missing features from description'
            echo 'Model: sonnet (fast, intent is usually clear)'
            echo ''
            echo '### clarity-reviewer'
            echo 'Assess code readability, naming, structure, comments.'
            echo 'Focus: confusing crypto logic, misleading names, missing comments for security patterns'
            echo 'Model: sonnet'
            echo ''
            echo '### robustness-reviewer'
            echo 'Find bugs, edge cases, error handling gaps in cryptographic operations and keystore management.'
            echo 'Focus: null checks, memory leaks, resource cleanup, threading issues, ECC curve validation, CSR generation errors, key extraction vulnerabilities'
            echo 'Model: opus (deepest reasoning for correctness and security)'
            echo ''
            echo '### consistency-reviewer'
            echo 'Check adherence to project patterns and conventions.'
            echo 'Focus: hardware vs software keystore decision logic, BouncyCastle provider management (remove system BC first), EncryptedFile usage for software keys, ProGuard rules, type safety (ECCurve unions)'
            echo 'Model: sonnet'
            echo ''
            echo '### completeness-reviewer'
            echo 'Verify testing, documentation, and security documentation completeness.'
            echo 'Focus: missing tests for keystore scenarios, undocumented API changes, security considerations not updated, ProGuard rules not documented, backup exclusion warnings'
            echo 'Model: haiku (fast, checklist-style)'
            echo ''
            echo '## Git Setup'
            echo 'The PR branch is checked out. Fetch main before running diff:'
            echo '```bash'
            echo 'git fetch origin main:main'
            echo '```'
            echo ''
            echo '## Review Workflow'
            echo ''
            echo '1. Fetch main branch'
            echo '2. Get PR diff: `gh pr diff ${pr_number}`'
            echo '3. Spawn all 5 agents in parallel using Agent tool with appropriate model'
            echo '4. Collect findings from each agent'
            echo '5. Deduplicate and merge findings'
            echo '6. Rate each finding 0-100 (confidence × impact)'
            echo '7. Filter to keep only findings >75'
            echo '8. Compile unified report grouped by severity:'
            echo '   - Critical (91-100)'
            echo '   - Important (76-90)'
            echo '   - Consider (51-75) - optional tier for context'
            echo '9. Post as SINGLE PR comment using `gh pr comment`'
            echo ''
            echo '## Bedrock Model Mapping'
            echo 'When spawning agents via Agent tool, use:'
            echo '- haiku → model: "haiku"'
            echo '- sonnet → model: "sonnet"'
            echo '- opus → model: "opus"'
            echo ''
            echo 'If opus fails with model access error, retry with sonnet and note downgrade in report.'
            echo ''
            echo '## Library-Specific Patterns to Check'
            echo ''
            echo '### Critical: Hardware vs Software Keystore (robustness + consistency reviewers)'
            echo '- Hardware keystore: Android 12+ (API 31) only for TLS/ECDH (`PURPOSE_AGREE_KEY`)'
            echo '- Software keystore fallback: Android 11 and below with warning'
            echo '- TLS compatibility: Must accurately check device capabilities'
            echo 'Flag hardware keystore usage on Android <12 without fallback.'
            echo ''
            echo '### Critical: Software Keystore Encryption (robustness + consistency reviewers)'
            echo '- Must use `EncryptedFile` from AndroidX Security (v1.2.0+)'
            echo '- AES256-GCM encryption with hardware-backed key'
            echo '- File permissions set to mode 0600'
            echo '- Excluded from backups via backup_rules.xml'
            echo 'Flag software keys without encryption or missing backup exclusion.'
            echo ''
            echo '### Critical: BouncyCastle Provider (robustness + consistency reviewers)'
            echo '- Remove system BC provider before registration'
            echo '- Register full BC provider with EC support'
            echo '- Use BC provider explicitly for operations'
            echo '- ProGuard rules must keep EC classes: org.bouncycastle.jcajce.provider.asymmetric.ec.**'
            echo 'Flag missing BC provider removal or missing ProGuard rules.'
            echo ''
            echo '### Type Safety (consistency reviewer)'
            echo '- Must validate curve values: "secp256r1", "secp384r1", "secp521r1"'
            echo '- Subject DN fields must be sanitized'
            echo '- IP address format validation for SAN'
            echo 'Flag missing validation or type safety issues.'
            echo ''
            echo '## Output Format'
            echo ''
            echo 'Post as SINGLE comment (no inline comments, no GitHub review):'
            echo ''
            echo "gh pr comment ${pr_number} --body \"\$(cat <<'REVIEW_REPORT'"
            echo '_🤖 Deep code review. Five specialized agents analyzed this PR._'
            echo ''
            echo '## Overview'
            echo '[One-line summary of changes]'
            echo ''
            echo '## Critical Issues (91-100)'
            echo '[List critical findings with reasoning and specific line numbers]'
            echo ''
            echo '## Important Issues (76-90)'
            echo '[List important findings]'
            echo ''
            echo '## Overall Assessment'
            echo '[Summary: safe to merge, needs attention, or blocked by critical issues]'
            echo 'REVIEW_REPORT'
            echo ')"'
            echo ''
            echo 'If report >60000 chars, truncate "Consider" tier with:'
            echo '"_N additional findings omitted. Run locally for full report._"'
            echo ''
            echo '## Context Files to Read'
            echo '- README.md - Library overview and security considerations'
            echo '- docs/ directory - Architecture and implementation details'
            echo '- Any CHANGELOG.md - Recent changes'
            echo 'DEEP_REVIEW_PROMPT_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::017820692424:role/GitHubClaudeBedrockRoleGeneracClean
          aws-region: us-east-1
          role-session-name: GitHubClaudeSession

      - name: Run Deep Code Review
        uses: anthropics/claude-code-action@v1
        with:
          use_bedrock: true
          track_progress: true
          trigger_phrase: '/deep-review'
          prompt: ${{ steps.prompt.outputs.prompt }}
          claude_args: |
            --model us.anthropic.claude-sonnet-4-6
            --max-turns 80
            --allowedTools "Agent,Read,Glob,Grep,Bash(git rev-parse:*),Bash(git log:*),Bash(git diff:*),Bash(git fetch:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh api:*),mcp__github__create_inline_comment,mcp__github__create_comment"
